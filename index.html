<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>InstaHash AI</title><meta name="description" content="Generate relevant Instagram hashtags with AI."><link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet"><style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap'); body{font-family:'Poppins',sans-serif;}.input-group{margin-bottom:1.5rem;}.btn{padding:0.75rem 1.5rem;border-radius:0.5rem;font-weight:700;cursor:pointer;transition:all 0.2s ease-in-out;}.btn-primary{background-color:#6366f1;color:white;}.btn-primary:hover{background-color:#4f46e5;}.card{background-color:white;border-radius:0.75rem;padding:2rem;box-shadow:0 10px 15px -3px rgba(0,0,0,0.1),0 4px 6px -2px rgba(0,0,0,0.05);}.gradient-bg{background:linear-gradient(to right top,#6366f1,#818cf8);}</style></head><body class="gradient-bg min-h-screen flex items-center justify-center p-4"><div class="card max-w-lg w-full text-center"><h1 class="text-4xl font-bold mb-4">InstaHash AI</h1><p class="text-gray-600 mb-6">Boost your Instagram reach with AI-powered hashtags.</p><div class="input-group"><input type="text" id="keyword" class="w-full p-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Enter keyword or upload image..."></div><div class="input-group"><label for="image-upload" class="btn btn-primary block w-full text-center py-3">Upload Image</label><input type="file" id="image-upload" accept="image/*" class="hidden"></div><button id="generate-btn" class="btn btn-primary w-full mb-4">Generate Hashtags</button><div id="results" class="bg-gray-100 p-4 rounded-md text-left hidden"><h3 class="font-bold mb-2">Suggested Hashtags:</h3><p id="hashtag-output" class="text-gray-800 break-words"></p><button id="copy-btn" class="btn btn-primary mt-4">Copy Hashtags</button></div><button id="buy-now-btn" class="btn btn-primary w-full mt-6">Buy Now for $9.99</button><script>document.getElementById('generate-btn').addEventListener('click', function(){const keyword = document.getElementById('keyword').value; /* Simulate API call */ setTimeout(() => {document.getElementById('hashtag-output').innerText = `#${keyword.replace(/ /g, '')} #trending #viral #growth #instagramtips #instahub`; document.getElementById('results').classList.remove('hidden');}, 500);});document.getElementById('copy-btn').addEventListener('click', function(){const text = document.getElementById('hashtag-output').innerText;navigator.clipboard.writeText(text).then(() => {alert('Copied to clipboard!');}).catch(err => {console.error('Failed to copy: ', err);});}); /* Integrate Stripe Checkout here */ document.getElementById('buy-now-btn').addEventListener('click', function(){alert('Proceeding to Stripe Checkout...'); /* In a real app, you'd trigger Stripe.redirectToCheckout here */});</script></div></body></html>
